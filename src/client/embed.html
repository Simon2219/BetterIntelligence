<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/views/embed.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="chat-header">Chat</div>
    <div id="chat-messages"></div>
    <div id="chat-input">
        <input type="text" id="input" placeholder="Type a message..." autocomplete="off">
        <button id="send">Send</button>
    </div>
    <script>
        const slug = (location.pathname.split('/embed/')[1] || '').replace(/\/$/, '').trim();
        if (!slug) { document.body.innerHTML = '<p>Invalid embed</p>'; } else {
            const msgEl = document.getElementById('chat-messages');
            const inputEl = document.getElementById('input');
            const sendBtn = document.getElementById('send');
            let conversationId = null;

            function addMsg(role, content) {
                const d = document.createElement('div');
                d.className = 'msg ' + role;
                d.textContent = content || '';
                msgEl.appendChild(d);
                msgEl.scrollTop = msgEl.scrollHeight;
            }
            function addImg(url) {
                const wrap = document.createElement('div');
                wrap.className = 'msg assistant';
                const img = document.createElement('img');
                img.src = url;
                img.alt = 'generated';
                img.style.cssText = 'max-width:100%;border-radius:8px;display:block';
                wrap.appendChild(img);
                msgEl.appendChild(wrap);
                msgEl.scrollTop = msgEl.scrollHeight;
            }

            const socket = io('/deploy/' + slug);

            socket.on('connect', () => {
                msgEl.querySelector('.msg.assistant')?.remove();
                addMsg('assistant', 'Connected. How can I help?');
            });
            socket.on('connect_error', (err) => {
                addMsg('assistant', 'Could not connect. Try refreshing.');
            });
            socket.on('agent:error', (d) => addMsg('assistant', 'Error: ' + (d.error || 'Unknown')));
            socket.on('conversation:created', (d) => { conversationId = d.conversationId; });
            socket.on('agent:stream', (d) => {
                if (d.chunk) {
                    let last = msgEl.querySelector('.msg.streaming');
                    if (!last) { last = document.createElement('div'); last.className = 'msg assistant streaming'; msgEl.appendChild(last); }
                    last.textContent = (last.textContent || '') + d.chunk;
                    msgEl.scrollTop = msgEl.scrollHeight;
                }
            });
            socket.on('agent:done', (d) => {
                const s = msgEl.querySelector('.msg.streaming');
                if (s) s.classList.remove('streaming');
                msgEl.scrollTop = msgEl.scrollHeight;
                sendBtn.disabled = false;
            });
            socket.on('agent:media', (d) => {
                (d.media || []).filter(m => m.url).forEach(m => addImg(m.url));
            });

            sendBtn.addEventListener('click', () => {
                const t = inputEl.value.trim();
                if (!t) return;
                addMsg('user', t);
                inputEl.value = '';
                sendBtn.disabled = true;
                socket.emit('deploy:message', { message: t, conversationId });
            });
            socket.on('agent:error', () => { sendBtn.disabled = false; });
            inputEl.addEventListener('keypress', e => { if (e.key === 'Enter') sendBtn.click(); });
        }
    </script>
</body>
</html>
